<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Игра-поздравление</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Игровая зона (полный экран) -->
    <div id="game-area"></div>

    <!-- Настройки -->
    <div id="setup-screen" class="card">
        <h1>✨ Создать поздравление</h1>
        <input type="text" id="recipientName" placeholder="Имя получателя">
        <input type="text" id="senderName" placeholder="Ваше имя">
        <textarea id="customMessage" placeholder="Напишите свое поздравление..."></textarea>
        <button id="generateLinkBtn">Сгенерировать ссылку</button>
        
        <div id="linkOutput" style="display:none; margin-top:25px;">
            <p style="font-weight: bold; color: #d81b60;">Ваша ссылка:</p>
            <div class="link-box">
                <a id="shareLink" href="#" target="_blank"></a>
            </div>
            <button id="copyBtn" class="secondary-btn">Скопировать ссылку</button>
        </div>
    </div>

    <!-- Игровой экран -->
    <div id="game-screen" class="hidden card">
        <h1>Поймай 8 сердечек ❤️</h1>
        <h2 id="gameRecipientTitle"></h2>
        <div id="score">0 / 8</div>
    </div>

    <!-- Поздравление -->
    <div id="congratulations-screen" class="hidden card">
        <h1>С 8 Марта, <span id="finalName"></span>!</h1>
        <p id="finalMsgText" style="font-size: 1.5em;"></p>
        <p>— <span id="finalSender"></span></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
