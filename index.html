<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Поздравление для Маши!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="setup-screen">
        <h1>Настройка поздравления</h1>
        <label>Имя получателя: <input type="text" id="recipientName" value="Маша"></label><br>
        <label>Ваше имя: <input type="text" id="senderName" value="Дима"></label><br>
        <button id="generateLinkBtn">Сгенерировать ссылку</button>
        <p id="linkOutput" style="display:none;">
            Ваша ссылка: <a id="shareLink" href="#" target="_blank"></a>
        </p>
    </div>

    <div id="game-screen" class="hidden">
        <h1>Поймай 8 сердечек ❤️</h1>
        <h2 id="gameRecipientTitle"></h2>
        <div id="score">0 / 8</div>
        <div id="game-area"></div>
    </div>

    <div id="congratulations-screen" class="hidden">
        <h1>С Днём 8 Марта, <span id="finalName"></span>!</h1>
        <p>Ты поймала все сердечки! С праздником!</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
